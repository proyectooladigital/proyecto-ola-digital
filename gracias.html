<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mensaje recibido — Proyecto Ola Digital</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400&display=swap" rel="stylesheet">
<style>
  :root { --oceano:#0B2540; --ola:#3ABFBF; --surfista:#F4833D; --espuma:#F0F6FA; --roca:#3A4A5C; }
  * { box-sizing:border-box; margin:0; padding:0; }
  body { font-family:'DM Sans',sans-serif; background:var(--espuma); color:var(--roca); min-height:100vh; display:flex; flex-direction:column; }
  nav { background:rgba(11,37,64,0.97); display:flex; align-items:center; justify-content:space-between; padding:0 2.5rem; height:62px; }
  .nav-logo { font-family:'Bebas Neue',sans-serif; font-size:1.4rem; color:var(--ola); letter-spacing:0.08em; text-decoration:none; }
  .nav-logo span { color:#fff; }
  .main { flex:1; display:flex; align-items:center; justify-content:center; padding:4rem 2rem; }
  .card { background:#fff; border-radius:24px; padding:3.5rem 3rem; max-width:520px; width:100%; text-align:center; border:1px solid rgba(58,191,191,0.2); box-shadow:0 20px 60px rgba(11,37,64,0.08); }
  .check { width:72px; height:72px; border-radius:50%; background:rgba(58,191,191,0.12); border:2px solid rgba(58,191,191,0.4); display:flex; align-items:center; justify-content:center; margin:0 auto 2rem; font-size:2rem; animation:popIn 0.5s cubic-bezier(0.16,1,0.3,1) both; }
  @keyframes popIn { from{transform:scale(0);opacity:0} to{transform:scale(1);opacity:1} }
  h1 { font-family:'Bebas Neue',sans-serif; font-size:2.4rem; color:var(--oceano); letter-spacing:0.05em; margin-bottom:1rem; line-height:1.1; }
  h1 em { color:var(--ola); font-style:normal; }
  p { font-size:0.95rem; font-weight:300; color:var(--roca); line-height:1.8; margin-bottom:0.6rem; }
  .btns { display:flex; gap:1rem; justify-content:center; flex-wrap:wrap; margin-top:2.5rem; }
  .btn-primary { background:var(--surfista); color:#fff; padding:13px 30px; border-radius:50px; font-family:'Bebas Neue',sans-serif; font-size:1rem; letter-spacing:0.1em; text-decoration:none; transition:transform 0.2s,box-shadow 0.2s; display:inline-block; }
  .btn-primary:hover { transform:translateY(-2px); box-shadow:0 8px 24px rgba(244,131,61,0.35); }
  .btn-outline { border:1.5px solid rgba(11,37,64,0.25); color:var(--oceano); padding:13px 30px; border-radius:50px; font-family:'Bebas Neue',sans-serif; font-size:1rem; letter-spacing:0.1em; text-decoration:none; transition:background 0.2s; display:inline-block; }
  .btn-outline:hover { background:rgba(11,37,64,0.05); }
  footer { background:var(--oceano); padding:1.4rem 2.5rem; display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:0.8rem; border-top:1px solid rgba(58,191,191,0.12); }
  .footer-logo { font-family:'Bebas Neue',sans-serif; font-size:1rem; letter-spacing:0.1em; color:var(--ola); text-decoration:none; }
  .footer-logo span { color:rgba(255,255,255,0.5); }
  .footer-copy { font-size:0.76rem; color:rgba(214,245,245,0.3); font-weight:300; }
</style>
</head>
<body>

<nav>
  <a href="index.html" class="nav-logo">Proyecto <span>Ola Digital</span></a>
</nav>

<main class="main">
  <div class="card">
    <div class="check">✓</div>
    <h1>Mensaje<br><em>recibido</em></h1>
    <p>Gracias por escribirnos. Tu mensaje llegó correctamente a nuestro equipo.</p>
    <p>Te responderemos a la brevedad en el correo que nos indicaste.</p>
    <div class="btns">
      <a href="index.html" class="btn-primary">Volver al inicio</a>
      <a href="proceso.html" class="btn-outline">Ver nuestro proceso</a>
    </div>
  </div>
</main>

<footer>
  <a href="index.html" class="footer-logo">Proyecto <span>Ola Digital</span></a>
  <p class="footer-copy">© 2026 Proyecto Ola Digital · Todos los derechos reservados</p>
</footer>

</body>
</html>
